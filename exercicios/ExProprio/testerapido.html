<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Portal Segundo Ano B</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* Splash */
        #splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #00ffff;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 9999;
            transition: opacity 2s ease;
        }

        /* Texto animado */
        .splash-text {
            opacity: 0;
            transform: translateY(40px);
            animation: aparecer 2s ease forwards;
            text-align: center;
        }

        @keyframes aparecer {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Conteúdo */
        #conteudo {
            display: none;
            padding: 30px;
        }
    </style>

</head>

<body>

    <div id="splash">
        <div class="splash-text">
            <h1>Portal Segundo Ano B</h1>
            <p>Centro de Excelência Jhon Kenedy</p>
        </div>
    </div>

    <div id="conteudo">
        <h2>Bem-vindo ao portal</h2>
        <p>Conteúdo do site aqui.</p>
    </div>

    <script>
        setTimeout(() => {

            const splash = document.getElementById("splash");
            const conteudo = document.getElementById("conteudo");

            splash.style.opacity = "0";

            setTimeout(() => {
                splash.remove();
                conteudo.style.display = "block";
            }, 1500);

        }, 5000);
    </script>

</body>

</html>
