<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudos de iframe</title>
    <style>

        iframe{
            width: 400px;
            height: 400px;
        }

        /* largura da barra */
        ::-webkit-scrollbar {
            width: 10px;
        }

        /* parte que se move */
        ::-webkit-scrollbar-thumb {
            background: #013253;
            border-radius: 15px;
        }

        /* quando passa o mouse */
        ::-webkit-scrollbar-thumb:hover {
            background: #02ccff;
        }

    </style>
</head>
<body>
    <h1>Testando o uso de um iframe</h1>
    <p>

        <!-- Tamanho padrão do iframe é 300x150.-->
        Acessando o site do
        <iframe src="https://www.cursoemvideo.com" frameborder="0" height="500px">

        </iframe>
        para aprender a programar.
    </p>

    <p>
        O repositório do Guanara
        <iframe src="https://gustavoguanabara.github.io" frameborder="0" height="500px"></iframe>
        também é bem legal.
    </p>

    <p>
        O repositório do Guanara
        <iframe src="https://gustavoguanabara.github.io" frameborder="0" height="500px"></iframe>
        também é bem legal.
    </p>
</body>
</html>
